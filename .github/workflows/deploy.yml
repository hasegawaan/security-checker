name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 20.196.128.219
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/azureuser/security-checker
            git pull git@github.com:hasegawaan/security-checker.git main
            pip3 install -q flask requests google-genai --break-system-packages 2>/dev/null || true
            sudo systemctl restart security-checker
            echo "デプロイ完了"
